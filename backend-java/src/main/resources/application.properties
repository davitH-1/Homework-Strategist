spring.application.name=HomeworkStrateguistSB-Gradle
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Caching (Helpful for Hackathon performance)
spring.cache.type=simple

# JSON Formatting for easier debugging
spring.jackson.serialization.indent_output=true

# If the environment variable exists, use it. Otherwise, use empty string.
canvas.api.token=${CANVAS_ACCESS_TOKEN:}
canvas.api.domain=${CANVAS_DOMAIN:canvas.socccd.edu}

# Server Configuration
server.port=8080

# Canvas API Configuration
# These pull from your .env file or system environment variables

# Logging (Helpful for debugging that empty 200 OK response)
logging.level.org.springframework.web=DEBUG
logging.level.com.yourproject.homeworkstrategist=DEBUG

# Spring Boot JSON formatting

# Hibernate Middleman Strategy
spring.jpa.show-sql=true

# Ensure naming strategy matches your snake_case SQL exactly

# Validates the Java entities against the Docker DB on startup.
# It will crash if it doesn't match, rather than overwriting your tables!

# Ensures variables like 'courseId' in Java map to 'course_id' in your MySQL schema

# Validate means: "Don't touch my Docker schema, just check if I mapped it right"
# PhysicalNamingStrategyStandardImpl ensures 'courseId' in Java maps to 'course_id' in SQL
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# MySQL Connection Settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#--------------------------------

# Paste the URL you copied here
spring.datasource.url=jdbc:mysql://localhost:3306/ai_planner

# Use the same Username and Password you used in the JetBrains tool
spring.datasource.username=planner
spring.datasource.password=planner

# This driver is standard for MySQL 8+
# Important: This allows Hibernate to talk to the MySQL tables
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update