<div class="courses-container">
  <header class="page-header">
    <h1>Dashboard</h1>
    <p>View your active Canvas courses</p>
  </header>

  <div *ngIf="isLoading" class="loading-spinner">
    <div class="spinner"></div>
    <p>Loading courses...</p>
  </div>

  <div *ngIf="!isLoading && courses.length === 0" class="empty-state">
    <p>No courses found. Ensure your backend is syncing correctly.</p>
  </div>

  <div class="courses-grid" *ngIf="!isLoading">
    <div class="course-card clickable"
         *ngFor="let course of courses"
         (click)="goToCourseDetails(course.id)">

      <div class="header-image-wrapper">
        <img *ngIf="course.image_download_url"
             [src]="course.image_download_url"
             [alt]="course.name"
             class="course-banner-img" />

        <div *ngIf="!course.image_download_url" class="card-color-strip">
          <span class="icon-letter">{{ course.name ? course.name[0] : 'C' }}</span>
        </div>
      </div>

      <div class="card-body">
        <h2 [title]="course.name">{{ course.name }}</h2>
        <span class="course-code">{{ course.course_code }}</span>
        <div class="card-footer">
          <span class="term-tag">Term ID: {{ course.term_id }}</span>
        </div>
      </div>

    </div>
  </div>
</div>
